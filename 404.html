<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirige todas las rutas al index.html manteniendo el path como query string
      // para que React Router pueda procesarla
      var segmentCount = 1; // cantidad de segmentos del basePath (/feru-store = 1)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
